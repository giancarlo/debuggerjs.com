new j5g3.Engine({
	stage_settings: {
		width: 640, height: 480
	},
	startFn(j5g3, engine) {
	"use strict";

var
	$loader = j5g3.loader(),

	/**
	 * Assets
	 */
	$assets = {
		walls: $loader.img('assets/pacman-walls.png'),
		characters: $loader.img('assets/pacman-characters.png'),
		fruits: $loader.img('assets/pacman-fruits.png')
	},

	$stats,
	game = {},

	/*************************
	 *
	 * Container Classes
	 *
	 *************************/
	Stack = Array,
	Queue = function() {},
	PriorityQueue = j5g3.Class.extend({

		init: function(fn)
		{
			this.data = [];
			if (fn) this.priority = fn;
		},

		pop: function()
		{
		var
			data = this.data,
			i = data.length,
			result = 0,
			node
		;
			while (i--)
				if (data[i].priority > data[result].priority)
					result = i;

			node = data.splice(result, 1)[0];

			return node && node.node;
		},

		priority: function(node)
		{
			return 0;
		},

		push: function(node)
		{
			this.data.push({
				priority: this.priority(node),
				node: node
			});
		}

	}),

	/*----------------------------
	 *
	 * AI Algorithms
	 *
	 *---------------------------*/
	Algorithms = {

		/**
		 * Q is the storage object. Needs to implement the pop and push methods.
		 */
		search: function(Q)
		{
		var
			graph = game.graph,
			node = graph.current,
			start = node,
			i, child, path
		;
			while (!node.destination)
			{
				i=node.length;
				while (i--)
				{
					child = node.children[i];
					if (!child.visited)
					{
						child.parent = node;
						Q.push(child);
					}
				}

				if ((node = Q.pop()))
					graph.load(node);
				else
					return [];
			}

			path = [node];

			while ((node = node.parent) && (node !== start))
				path.unshift(node);

			return path;
		},

		dfs: function()
		{
			return Algorithms.search(new Stack());
		},

		bfs: function(Q)
		{
			return Algorithms.search(new Queue());
		},

		ucs: function()
		{
		var
			Q = new PriorityQueue()
		;
			Q.priority = function(node)
			{
				game.graph.load(node);
				return (node.cost = (node.parent ? node.parent.cost : 0) + ({
					'P': -1,
					'G': -50,
					' ': -1,
					'.': 1
				})[node.char]);
			};

			return Algorithms.search(Q);
		},

		a_star: function()
		{
		var
			Q = new PriorityQueue(function(node) {
			var
				p = game.dotpos, i, h, heuristic=Infinity,
				geth = function(x, y) {
					//return Math.sqrt(x*x + y*y);
					return Math.abs(x) + Math.abs(y);
				}
			;
				game.graph.load(node);

				for (i in game.dotpos)
				{
					h = geth(p[i].x - node.x, p[i].y - node.y);
					if (h < heuristic)
						heuristic = h;
				}

				if (heuristic===Infinity)
					heuristic = 0;

				//heuristic = node.length;

				//return heuristic;

				node.cost = (node.parent ? node.parent.cost : 0) + ({
					'P': -1,
					'G': -50,
					' ': -1,
					'.': 0
				})[node.char] - (heuristic);

				return node.cost;
			})
		;
			return Algorithms.search(Q);
		}
	},

	/**
	 * Pacman Class
	 */
	Pacman = j5g3.Clip.extend({

		st: 0.1,
		width: 32, height: 32,

		init: function()
		{
			j5g3.Clip.apply(this);

			this.add(CHARS.sprite(10));
			this.add_frame(CHARS.sprite(11));
		}

	}),

	/**
	 * Pacman Class
	 */
	Ghost = j5g3.Clip.extend({

		st: 0.25,
		width: 32, height: 32,

		init: function(p)
		{
		var
			c = (this.color = Math.floor(j5g3.rand(5)))*2
		;
			j5g3.Clip.apply(this);

			this.add(CHARS.sprite(c));
			this.add_frame(CHARS.sprite(c+1));
		}

	}),

	/**
	 * Encapsulates a Layout
	 */
	Layout = j5g3.Map.extend({

		tw: 32,
		th: 32,

		init: function(data)
		{
			j5g3.Map.call(this);

		var
			walls = j5g3.spritesheet($assets.walls).grid(6,5),
			fruits= j5g3.spritesheet($assets.fruits).grid(4,3),

			mapsprites = {
				"  %%": 25,
				" %% ": 16,
				" %%%": 3,
				" % %": 5,
				"%  %": 9,
				"% % ": 20,
				"%%  ": 24,
				"% %%": 14,
				"%   ": 23,
				" %  ": 22,
				"%% %": 17,
				"   %": 8,
				"  % ": 2,
				"%%% ": 21,
				"%%%%": 15,
				"    ": 11
			},

			// Assume rectangular map
			x, y, xl, yl, tw, th,
			row, s, smap=[], srow,
			me = this,
			ghost,

			translate_map= function()
			{
				game.dotpos = {};
				// Translate Map
				for (y=0; y<yl; y++)
				{
					row = data[y];
					smap.push(srow = []);

					for (x=0; x<xl; x++)
					{
						s = row[x];
						if (s==='%')
						{
							s = (y > 0 ? data[y-1][x] : ' ') +
								(x > 0 ? data[y][x-1] : ' ') +
								(x < xl-1? data[y][x+1] : ' ') +
								(y < yl-1? data[y+1][x] : ' ')
							;
							s = s.replace(/[P\.G]/g, ' ');
							s = mapsprites[s] || 0;
						}
						else if (s==='G')
						{
							ghost = new Ghost();
							game.ghosts.add(ghost.pos(x*tw, y*th).stretch(tw, th));
							s = me.SPRITE_SPACE;
							$stats.nodes++;
						}
						else if (s==='P')
						{
							game.pacman.pos(x*tw, y*th).stretch(tw, th);
							game.pacman.XY = [ x, y];
							s = me.SPRITE_SPACE;
							$stats.nodes++;
						} else if (s==='.')
						{
							s = me.SPRITE_DOT;
							$stats.nodes++;
							$stats.points += 1;
							game.dotpos[x+' '+y] = { x:x, y: y };
						} else
						{
							s = me.SPRITE_SPACE;
							$stats.nodes++;
						}

						srow.push(s);
					}
				}

				return smap;
			},

			W = $engine.stage.width, H = $engine.stage.height
		;
			me.SPRITE_SPACE = 29;
			me.SPRITE_DOT   = 30;

			xl = data[0].length;
			yl = data.length;

			tw = me._tw = W / xl;
			th = me._th = H / yl;

			me.scale(tw/me.tw, th/me.th).size(W/tw*me.tw, H/th*me.th);

			// TODO accessing private member...
			walls._sprites.push(fruits._sprites[10]);

			me.sprites = walls.sprites();
			me.map = translate_map();
		}

	}),

	Graph = j5g3.Class.extend({

		init: function Graph(data)
		{
		var
			me = this, xy = game.pacman.XY
		;
			me.data = data.split("\n");
			// UGLY HACK

			me.reset(xy[0], xy[1]);
		},

		reset: function(x, y)
		{
			this.nodes = {};
			this.root = this.load(this.getNode(x, y));
		},

		getNode: function(x, y)
		{
		var
			key = x+' '+y
		;
			return this.nodes[key] || (this.nodes[key] = { x: x, y: y });
		},

		replace: function(x, y, what)
		{
		var
			str = this.data[y]
		;
			this.data[y] = str.substr(0, x) + what + str.substr(x+1);
		},

		load: function(node)
		{
		var
			me = this,
			FREE = ' ',
			DESTINATION = '.',

			x  = node.x, y = node.y,
			children,
			map = me.data
		;
			$stats.visited++;

			if (!node.visited)
			{
				children = node.children = [];

				if (map[y-1] && map[y-1][x] !== '%')
					children.push(me.getNode(x, y-1));
				if (map[y][x+1] !== '%')
					children.push(me.getNode(x+1, y));
				if (map[y+1] && map[y+1][x] !== '%')
					children.push(me.getNode(x, y+1));
				if (map[y][x-1] !== '%')
					children.push(me.getNode(x-1, y));

				if ((node.char = map[y][x])===DESTINATION)
					node.destination = true;

				node.length = children.length;
				node.cost = 0;
				node.visited = true;
			}

			return (me.current = node);
		}

	}),

	mapfile = j5g3.id('map'),
	algo    = j5g3.id('algo'),

	algorithm,
	data,

	background, moves,

	update_stats = function()
	{
		for(var i in $stats)
			j5g3.id(i).innerHTML = $stats[i];
	},

	do_move = function()
	{
	var
		graph = game.graph
	;
		graph.reset(graph.current.x, graph.current.y);
		moves  = algorithm();
		$stats.moves += moves.length;
		update_stats();
	},

	reset = function()
	{
		$engine.pause();

		$stats = {
			nodes: 0,
			collected : 0,
			visited: 0,
			points: 0,
			moves: 0
		};

		var ghosts = game.ghosts = j5g3.clip();
		var pacman = game.pacman = new Pacman();
		background = new Layout(data.split("\n"));
		var graph = game.graph = new Graph(data);

		do_move();

		$engine.stage.remove_frame();
		$engine.stage.add_frame([ background, pacman, ghosts, run ]);

		$engine.run();
	},

	run = j5g3.action(function()
	{
	var
		piece = moves.shift()
	;
		run.remove();

		if (piece)
			go(piece);
	}),

	loadmap = function()
	{
		data = MAPS[mapfile.value].trim();
		$loader.ready(function() {
			CHARS = j5g3.spritesheet($assets.characters).grid(14, 4);
			loadalgo();
		});
	},

	loadalgo = function()
	{
		algorithm = Algorithms[algo.value];
		if (data) reset();
	},

	check_points= function(node)
	{
		if (node.char=='.')
		{
			$stats.collected++;
			game.graph.replace(node.x, node.y, ' ');
			delete game.dotpos[node.x+' '+node.y];

			background.map[node.y][node.x] = background.SPRITE_SPACE;

			do_move();
		}
	},

	go = function(node)
	{
	var
		x, y
	;
		// Note: Using precalculated TW and TH
		x = node.x * background._tw;
		y = node.y * background._th;

		$engine.stage.add(j5g3.tween({
			auto_remove: true,
			duration: 3,
			target: game.pacman,
			to: { x: x, y: y },
			on_remove: function()
			{
				$engine.stage.add(run);
				check_points(node);
			}
		}));
	},

	$engine = this,
	CHARS
;
	Queue.prototype = [];
	Queue.prototype.pop = Array.prototype.shift;

	algo.addEventListener('change', loadalgo);
	mapfile.addEventListener('change', loadmap);

	loadmap();
}});
</script>
